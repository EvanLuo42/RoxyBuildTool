name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Validate tag and version
        id: metadata
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $semVer = '^(?<tag>v(?<version>(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*)?))$'
          if ($tag -notmatch $semVer) {
            throw "Tag '$tag' must be SemVer in the form v1.2.3 or v1.2.3-rc.1."
          }

          $version = $Matches.version
          [xml] $props = Get-Content -Raw Directory.Build.props
          $projectVersion = [string] $props.SelectSingleNode('/Project/PropertyGroup/Version').InnerText
          if ($projectVersion -ne $version) {
            throw "Tag version '$version' does not match Directory.Build.props Version '$projectVersion'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore RoxyBuildTool.slnx

      - name: Build
        run: dotnet build RoxyBuildTool.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RoxyBuildTool.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack RoxyBuildTool.slnx --configuration Release --no-build --output artifacts/packages -p:PackageVersion=${{ steps.metadata.outputs.version }}

      - name: Publish packages
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        run: |
          $packages = @(Get-ChildItem -LiteralPath artifacts/packages -Filter *.nupkg -File | Sort-Object Name)
          if ($packages.Count -eq 0) {
            throw "No NuGet packages were found in artifacts/packages."
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName `
              --api-key $env:NUGET_API_KEY `
              --source $env:NUGET_SOURCE `
              --skip-duplicate

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to publish '$($package.Name)'."
            }
          }
