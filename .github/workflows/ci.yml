name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props
      - name: Restore
        run: dotnet restore RoxyBuildTool.slnx
      - name: Build
        run: dotnet build RoxyBuildTool.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test RoxyBuildTool.slnx --configuration Release --no-build
      - name: Pack
        run: dotnet pack RoxyBuildTool.slnx --configuration Release --no-build --output artifacts/packages
